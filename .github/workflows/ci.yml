name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64-linux
            runner: ubuntu-latest
          - arch: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: logos-co
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build package
        run: nix build --print-build-logs

      - name: Run unit tests
        run: nix build '.#checks.${{ matrix.arch }}.unit' --print-build-logs

      - name: Run integration tests
        run: nix build '.#checks.${{ matrix.arch }}.integration' --print-build-logs

      # Docker smoke tests live in their own directory (`tests/docker_smoke/`)
      # rather than under `tests/integration/`, because they can't run
      # inside the nix sandbox (no docker socket). Separating them
      # physically keeps the `integration` nix check clean — no silent
      # skips — and makes this CI step the *only* place they run.
      #
      # Step 1 builds the `logoscore:smoke-portable` image (a multi-stage
      # `docker build` that internally runs `nix build` inside a
      # `nixos/nix` container — no dependency on the host's nix).
      # Step 2 runs pytest via `nix develop` so python + pytest are on
      # PATH and PYTHONPATH points at the local `logoscore` source tree.
      # Defaults to FLAVOR=portable / --docker-flavor=portable — that's
      # the self-contained cli-bundle-dir shape that matches how released
      # logoscore binaries are distributed, so it's the most realistic
      # smoke. `dev` is still available via FLAVOR=dev on the build step
      # and --docker-flavor=dev on pytest.
      - name: Build docker smoke image
        run: ./tests/docker_smoke/build_smoke_image.sh

      - name: Run docker smoke tests
        run: |
          nix develop --command pytest tests/docker_smoke -v
