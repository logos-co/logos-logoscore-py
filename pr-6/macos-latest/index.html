py\n\n```python\nimport os, threading, time\n\n# The daemon loads Qt module plugins; force the headless platform before\n# anything spawns it. The dev shell puts logoscore on PATH but does not set\n# this, so we set it here (mirroring the repo's integration check).\nos.environ.setdefault(\"QT_QPA_PLATFORM\", \"offscreen\")\n\nfrom logoscore import LogoscoreDaemon\n\nBIN = os.environ[\"LOGOSCORE_BIN\"]\nMODULES = os.environ[\"LOGOSCORE_TEST_MODULES_DIR\"]\nMOD = \"test_basic_module\"\n\nwith LogoscoreDaemon(modules_dir=MODULES, binary=BIN) as daemon:\n    client = daemon.client()\n\n    client.load_module(MOD)\n\n    info = client.module_info(MOD)\n    method_names = {m[\"name\"] for m in info[\"methods\"]}\n    assert \"addInts\" in method_names, method_names\n    print(\"module-info methods include addInts:\", \"addInts\" in method_names)\n\n    # Each value below is pinned by the repo's integration suite\n    # (tests/_basic_module_cases.py / tests/integration/).\n    assert client.call(MOD, \"addInts\", 2, 3) == 5\n    print(\"addInts(2,3) =\", client.call(MOD, \"addInts\", 2, 3))\n\n    assert client.call(MOD, \"returnString\") == \"test_basic_module\"\n    print(\"returnString =\", client.call(MOD, \"returnString\"))\n\n    assert client.call(MOD, \"concat\", \"foo\", \"bar\") == \"foobar\"\n    print(\"concat =\", client.call(MOD, \"concat\", \"foo\", \"bar\"))\n\n    assert client.call(MOD, \"splitString\", \"a,b,c\") == [\"a\", \"b\", \"c\"]\n    print(\"splitString =\", client.call(MOD, \"splitString\", \"a,b,c\"))\n\n    # Event round-trip: subscribe, fire emitTestEvent, wait for the callback.\n    received: list[dict] = []\n    got = threading.Event()\n\n    def on_event(evt: dict) -> None:\n        received.append(evt)\n        got.set()\n\n    with client.on_event(MOD, \"testEvent\", on_event):\n        time.sleep(0.5)  # let the watcher subscribe before firing\n        client.call(MOD, \"emitTestEvent\", \"hello from python\")\n        assert got.wait(timeout=10.0), \"event not received within 10s\"\n\n    payload = received[0]\n    assert any(\"hello from python\" in str(v) for v in payload.values())\n    print(\"event payload contained: hello from python\")\n\nprint(\"ALL CHECKS PASSED\")\n```\n\nThe `with LogoscoreDaemon(...)` block spawns `logoscore -D` with an isolated\nconfig dir and tears it down on exit. `daemon.client()` reads the per-module\nendpoints the daemon wrote at startup.", "execs": [{"kind": "file", "cmd": "write drive_logoscore.py", "status": "pass", "note": "Wrote drive_logoscore.py"}]}, {"md": "## Step 4: Run the driver\n\nRun the program inside the dev shell so `logoscore` and the test-modules dir are on\nthe environment. We point `PYTHONPATH` at the `logoscore` package we built in step 1\n(its site-packages under `./result`) so `import logoscore` resolves \u2014 `nix develop\n--command` runs non-interactively and doesn't apply the dev shell's\n`PYTHONPATH=$PWD/src` hook. A clean exit with `ALL CHECKS PASSED` is the end-to-end\nproof.", "execs": []}, {"md": "### 4.1 Run drive_logoscore.py\n\n```bash\n# ./result is the package built in step 1; add its site-packages to PYTHONPATH\nSITE_PACKAGES=\"$(dirname \"$(dirname \"$(find -L result -name '__init__.py' -path '*logoscore*' | head -n1)\")\")\"\nnix develop 'github:logos-co/logos-logoscore-py/ed19d6283f1d2dece7e2213aad2a7a057f914a94' --command \\\n  env PYTHONPATH=\"$SITE_PACKAGES\" QT_QPA_PLATFORM=offscreen python drive_logoscore.py\n```", "execs": [{"kind": "run", "cmd": "SITE_PACKAGES=\"$(dirname \"$(dirname \"$(find -L result -name '__init__.py' -path '*logoscore*' | head -n1)\")\")\"\nnix develop 'github:logos-co/logos-logoscore-py/ed19d6283f1d2dece7e2213aad2a7a057f914a94' --command \\\n  env PYTHONPATH=\"$SITE_PACKAGES\" QT_QPA_PLATFORM=offscreen python drive_logoscore.py\n", "status": "pass", "exit_code": 0, "output": "GC Warning: Repeated allocation of very large block (appr. size 408 KiB):\n\tMay lead to memory leak and poor performance\nlogos-logoscore-py dev shell\n  python:                                  Python 3.13.7\n  logoscore:                               logoscore version 1.0\n  LOGOSCORE_BIN:                           /nix/store/xxa8gqaf6dsvc1309fpn5hnhj9i2iphj-logos-logoscore-cli/bin/logoscore\n  LOGOSCORE_TEST_MODULES_DIR (dev):        /nix/store/3y54543zc4lkn06iwv7vz3xmqhbqk6np-logoscore-py-test-modules/modules\n  LOGOSCORE_TEST_MODULES_DIR_PORTABLE:     /nix/store/z76mgrrx3jgv6k22527l3mjr1r6m9pps-logoscore-py-test-modules-portable/modules\nmodule-info methods include addInts: True\naddInts(2,3) = 5\nreturnString = test_basic_module\nconcat = foobar\nsplitString = ['a', 'b', 'c']\nevent payload contained: hello from python\nALL CHECKS PASSED\n", "note": ""}]}, {"md": "## Recap\n\nYou drove a real `logoscore` daemon entirely from Python with this wrapper commit:\n\n| Step | API used | Proves |\n|---|---|---|\n| build | `nix build` + `pythonImportsCheck` | the package imports |\n| spawn | `LogoscoreDaemon(...)` | a headless daemon starts with an isolated config |\n| call | `client.call(mod, method, *args)` | method calls round-trip real values |\n| events | `client.on_event(...)` | event subscription + delivery works |\n\nBecause the wrapper, the CLI, and `test_basic_module` all resolve through the commit\nunder test, a green run proves this `logos-logoscore-py` commit drives a daemon from\nPython end-to-end.", "execs": []}]}]}</script>
<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
